monitor=,preferred,auto,1

# ── Variables ────────────────────────────────────────────────
$mod         = SUPER
$scripts     = ~/.config/hypr/scripts
$term        = alacritty
$browser     = firefox
$fileManager = Dolphin
$launcher    = rofi -show drun            # e.g. wofi, rofi, tofi

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = $terminal
# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox
exec = killall waybar ; waybar -c ~/.config/hypr/waybar/config.jsonc -s ~/.config/hypr/waybar/style.css

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 0
    gaps_out = 0

    border_size = 1

    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = master
}

decoration {
    rounding = 0
    shadow {
        enabled = false
    }
    blur {
        enabled = false
    }
}

xwayland {
    force_zero_scaling = true
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = false
}

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrule = rounding 0, floating:0, onworkspace:w[tv1]
# windowrule = bordersize 0, floating:0, onworkspace:f[1]
# windowrule = rounding 0, floating:0, onworkspace:f[1]

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
    mfact = 0.50
    orientation = left
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = gb
    kb_variant = extd
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

###################
### KEYBINDINGS ###
###################

# ── Launchers ────────────────────────────────────────────────
bind = $mod,       Space,  exec, $launcher
bind = $mod, Return, exec, $term

# Web browser
bind = $mod, slash, exec, $browser


# ── Workspaces (XMonad-style) ─────────────────────────────────

bind = $mod, a, focusworkspaceoncurrentmonitor, 1
bind = $mod, s, focusworkspaceoncurrentmonitor, 2
bind = $mod, d, focusworkspaceoncurrentmonitor, 3
bind = $mod, f, focusworkspaceoncurrentmonitor, 4
bind = $mod, g, focusworkspaceoncurrentmonitor, 5

# Move focused window to workspace
bind = $mod SHIFT, a, movetoworkspace, 1
bind = $mod SHIFT, s, movetoworkspace, 2
bind = $mod SHIFT, d, movetoworkspace, 3
bind = $mod SHIFT, f, movetoworkspace, 4
bind = $mod SHIFT, g, movetoworkspace, 5

# Workspace history
bind = $mod, Escape, workspace, previous
bind = $mod, Tab,    workspace, e+1

# ── Special Workspaces (Scratchpads) ─────────────────────────

bind = $mod, q, exec, $scripts/scratchpad.sh files    org.kde.dolphin
bind = $mod, w, exec, $scripts/scratchpad.sh discord  com.discordapp.Discord
bind = $mod, e, exec, $scripts/scratchpad.sh obsidian md.obsidian.Obsidian
bind = $mod, r, exec, $scripts/scratchpad.sh zotero   zotero
bind = $mod, t, exec, $scripts/scratchpad.sh spotify  com.spotify.Client

# Window rules — assign each app to its scratchpad on launch
windowrule = workspace special:files silent,    match:class ^($fileManager)$
windowrule = workspace special:discord silent,  match:class ^(discord)$
windowrule = workspace special:obsidian silent, match:class ^(obsidian)$
windowrule = workspace special:zotero silent,   match:class ^(Zotero)$
windowrule = workspace special:spotify silent,  match:class ^(Spotify)$

# Scratchpad sizing (gap around the overlay window)
workspace = special:files,    gapsout:50
workspace = special:discord,  gapsout:50
workspace = special:obsidian, gapsout:50
workspace = special:zotero,   gapsout:50
workspace = special:spotify,  gapsout:50



# ── Window Navigation ────────────────────────────────────────
bind = $mod,       j, cyclenext,
bind = $mod,       k, cyclenext, prev
bind = $mod SHIFT, j, swapnext,
bind = $mod SHIFT, k, swapnext,  prev
bind = $mod,       m, layoutmsg, focusmaster
bind = $mod SHIFT, m, layoutmsg, swapwithmaster


# ── Master Layout Control ─────────────────────────────────────
binde = $mod, h, layoutmsg, mfact -0.05
binde = $mod, l, layoutmsg, mfact +0.05
bind  = $mod, o, layoutmsg,  orientationcycle left center


# ── Monitor Management ────────────────────────────────────────
bind = $mod,       semicolon, focusmonitor,   +1
bind = $mod SHIFT, semicolon, movewindow,     mon:+1


# ── Window Management ─────────────────────────────────────────
bind = $mod, y, killactive,
bind = $mod, u, togglefloating,
bind = $mod, i, fullscreen, 0


# ── Screenshots ───────────────────────────────────────────────
# Requires: grim, slurp, wl-copy
bind = ,           Print, exec, grim - | wl-copy
bind = $mod,       Print, exec, grim -g "$(hyprctl activewindow -j | jq -r '"\(.at[0]),\(.at[1]) \(.size[0])x\(.size[1])"')" - | wl-copy
bind = SHIFT,      Print, exec, grim -g "$(slurp)" - | wl-copy


# ── Media & Hardware ──────────────────────────────────────────
# Requires: wpctl (volume), brightnessctl (brightness), playerctl (media)
bindl = , XF86AudioRaiseVolume,   exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+
bindl = , XF86AudioLowerVolume,   exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl = , XF86AudioMute,          exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl = , XF86AudioPlay,          exec, playerctl play-pause
bindl = , XF86AudioNext,          exec, playerctl next
bindl = , XF86AudioPrev,          exec, playerctl previous
bindl = , XF86MonBrightnessUp,    exec, brightnessctl s +5%
bindl = , XF86MonBrightnessDown,  exec, brightnessctl s 5%-


# ── Session Management ────────────────────────────────────────
bind = $mod,       z,     exec,   hyprlock
bind = $mod,       x,     exec,   hyprctl reload
bind = $mod SHIFT, x,     exit,
bind = $mod,       b,     exec,   YOUR_WALLPAPER_COMMAND_HERE  # e.g. swww img $(find ~/wallpapers -type f | shuf -n1)


# ── Notifications ─────────────────────────────────────────────
# Requires: dunst
bind = $mod,       n, exec, dunstctl close
bind = $mod SHIFT, n, exec, dunstctl close-all

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

